<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; font-src 'self' data:;">
  <title>Black Hole - Spacetime Observatory</title>
</head>
<body>
  <div id="canvas-container"></div>
  
  <div id="hud">
    <!-- Header -->
    <div class="header">
      <div class="logo">Spacetime Observatory / Black Hole</div>
      <div class="user-info">
        <button class="glass-btn" onclick="window.location.href='./home.html'">← Home</button>
        <button class="glass-btn" onclick="window.location.href='./equations.html'">Equations</button>
      </div>
    </div>
    
    <!-- Info Panel -->
    <div class="info-panel glass-panel">
      <h3 style="margin-bottom: 16px; font-size: 18px;">Physics Data</h3>
      
      <div class="info-row">
        <span class="glass-label">Distance</span>
        <span class="info-value" id="value-distance">5.00 r_s</span>
      </div>
      
      <div class="info-row">
        <span class="glass-label">Time Dilation α</span>
        <span class="info-value" id="value-alpha">0.8944</span>
      </div>
      
      <div class="info-row">
        <span class="glass-label">Redshift z</span>
        <span class="info-value" id="value-redshift">0.12</span>
      </div>
      
      <div class="info-row">
        <span class="glass-label">Tidal Force</span>
        <span class="info-value" id="value-tidal">0.00e+0 m/s²</span>
      </div>
      
      <div class="info-row">
        <span class="glass-label">Performance</span>
        <span class="info-value" id="value-fps">60 FPS</span>
      </div>
    </div>
    
    <!-- Controls -->
    <div class="controls glass-panel">
      <div class="control-group">
        <label class="glass-label">Observer Distance (r/r_s)</label>
        <div class="slider-container">
          <input 
            type="range" 
            id="slider-distance" 
            class="glass-slider" 
            min="1.02" 
            max="50" 
            step="0.1" 
            value="5"
          >
          <span class="slider-value" id="slider-value-distance">5.00 r_s</span>
        </div>
      </div>
      
      <div style="display: flex; gap: 12px; margin-top: 16px;">
        <button class="glass-btn" id="btn-reset">Reset View</button>
        <button class="glass-btn" onclick="window.location.href='./equations.html'">
          How It Works
        </button>
      </div>
    </div>
  </div>
  
  <div class="footer">
    <p>© 2026 Turki Abdullah. All Rights Reserved.</p>
  </div>
  
  <script type="module">
    // Import styles
    import './styles/app.css';
    import './styles/glass.css';
    
    import auth from './src/core/auth.js';
    import CanvasRoot from './src/render/canvasRoot.js';
    import SpaceBackground from './src/render/spaceBackground.js';
    import BlackHoleScene from './src/render/blackholeScene.js';
    import PostFX from './src/render/postFX.js';
    import HUD from './src/ui/hud.js';
    import Controls from './src/ui/controls.js';
    import perf from './src/core/perf.js';
    
    // Require login
    auth.requireLogin();
    
    // Setup canvas
    const container = document.getElementById('canvas-container');
    const canvasRoot = new CanvasRoot(container);
    if (!canvasRoot.init()) {
      alert('Failed to initialize canvas');
    }
    
    // Create scene components
    const spaceBackground = new SpaceBackground(canvasRoot);
    const blackHoleScene = new BlackHoleScene(canvasRoot);
    const postFX = new PostFX(canvasRoot);
    
    spaceBackground.init();
    blackHoleScene.init();
    
    // Setup HUD
    const hud = new HUD();
    hud.init();
    
    // Setup controls
    const controls = new Controls(
      (distance) => {
        blackHoleScene.setDistance(distance);
        const state = blackHoleScene.getState();
        hud.setData(state);
      },
      () => {
        blackHoleScene.setDistance(5);
        const state = blackHoleScene.getState();
        hud.setData(state);
      }
    );
    controls.init('blackhole');
    
    // Initial state
    const initialDistance = controls.getValue();
    blackHoleScene.setDistance(initialDistance);
    hud.setData(blackHoleScene.getState());
    
    // Animation loop
    function animate(time) {
      // Clear
      canvasRoot.clear('#000000');
      
      // Update
      spaceBackground.update(time);
      blackHoleScene.update(time);
      
      // Render
      spaceBackground.render(time);
      blackHoleScene.render(time);
      spaceBackground.renderNebula();
      postFX.apply(0.4, 0.2);
      
      // Update FPS
      perf.fpsCounter.update();
      hud.updateFPS();
      
      requestAnimationFrame(animate);
    }
    
    animate(0);
  </script>
</body>
</html>
