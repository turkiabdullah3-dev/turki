<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; font-src 'self' data:;">
  <title>Login - Spacetime Observatory</title>
  <script type="module" crossorigin src="./assets/login-D1wpnmZM.js"></script>
  <link rel="modulepreload" crossorigin href="./assets/modulepreload-polyfill-YP0FEG5d.js">
  <link rel="modulepreload" crossorigin href="./assets/auth-CR3qn4r5.js">
  <link rel="modulepreload" crossorigin href="./assets/sanitize-Dr5TeDim.js">
  <link rel="stylesheet" crossorigin href="./assets/auth-pA4yY1qD.css">
</head>
<body>
  <div id="canvas-container"></div>
  
  <div class="login-container">
    <div class="login-box glass-panel glow-border">
      <h1 class="glass-title" style="font-size: 36px;">Spacetime Observatory</h1>
      <p class="glass-subtitle" style="font-size: 16px; margin-bottom: 32px;">Interactive Physics Experience</p>
      
      <div id="error-message" class="error-message" style="display: none;"></div>
      
      <form id="login-form">
        <div class="form-group">
          <label class="glass-label">Username</label>
          <input 
            type="text" 
            id="username" 
            class="glass-input" 
            placeholder="Enter username"
            autocomplete="username"
            required
          >
        </div>
        
        <button type="submit" class="glass-btn primary btn-block">
          Enter Observatory
        </button>
      </form>
      
      <div style="margin-top: 24px; text-align: center;">
        <p class="glass-text" style="font-size: 12px; color: rgba(255,255,255,0.5);">
          Valid users: turki (owner), mashael (guest)
        </p>
      </div>
    </div>
  </div>
  
</body>
</html>
